server {
    # Listen on port 8080 as expected by Google Cloud Run
    listen 8080;
    server_name localhost;

    # Enable gzip compression for faster asset delivery
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Essential for React/Vite SPAs: fallback all routes to index.html
        try_files $uri $uri/ /index.html;
    }

    # Highly optimized caching strategy for static assets
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        root /usr/share/nginx/html;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, max-age=15552000, immutable";
    }
}
