<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <!-- Deep sapphire to bright cyan gradient -->
      <stop offset="0%" stop-color="#0b2b5e" />
      <stop offset="100%" stop-color="#00e5ff" />
    </linearGradient>
  </defs>

  <!-- Wide, geometric sans-serif 'V' -->
  <path d="M 20 25 L 50 60 L 80 25" 
        fill="none" 
        stroke="url(#techBlue)" 
        stroke-width="16" 
        stroke-linecap="square" 
        stroke-linejoin="miter" />

  <!-- Network transmission lines connecting to the bottom point -->
  <path d="M 50 64 L 50 86 M 50 64 L 28 80 M 50 64 L 72 80" 
        fill="none" 
        stroke="url(#techBlue)" 
        stroke-width="5" 
        stroke-linecap="round" />

  <!-- Interconnected cluster dots -->
  <circle cx="50" cy="86" r="6" fill="url(#techBlue)" />
  <circle cx="28" cy="80" r="6" fill="url(#techBlue)" />
  <circle cx="72" cy="80" r="6" fill="url(#techBlue)" />
</svg>